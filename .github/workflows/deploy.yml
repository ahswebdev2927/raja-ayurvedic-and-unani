name: Deploy Website to Hostinger

on:
  push:
    branches:
      - main # Triggers when you push to the main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '23'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build and Export Static HTML
        run: npm run build

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          # If you set FTP_TARGET_DIR in secrets it will use it, otherwise it defaults to public_html/
          server-dir: ${{ secrets.FTP_TARGET_DIR || './' }}
          state-name: .ftp-deploy-sync-state.json
          timeout: 120000

      - name: Reset Sync State (Prevent 550 Deletion Errors)
        run: |
          curl -u "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" ftp://${{ secrets.FTP_SERVER }}/ -Q "DELE .ftp-deploy-sync-state.json" || true
